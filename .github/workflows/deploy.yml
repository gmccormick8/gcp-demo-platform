name: GCP Demo - Terraform Infrastructure Pipeline

on:
  push:
    branches: [ "prod", "staging", "dev" ]
  pull_request_target:
    branches: [ "prod", "staging", "dev" ]
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          # This is important for pull_request_target to checkout PR code

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12.0'

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform Validate
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
        run: terraform validate -no-color

      - name: Terraform Plan
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          # Prevent prompts in CI/CD environment
          TF_IN_AUTOMATION: "true"
        run: |
          # Create plan with detailed exit codes:
          # 0 = No changes
          # 1 = Error
          # 2 = Changes present
          terraform plan -detailed-exitcode -out=tfplan -no-color || \
          if [ $? -eq 1 ]; then
            echo "Terraform plan failed"
            exit 1
          fi

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  apply:
    needs: plan
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    if: |
      (github.event_name != 'pull_request_target' && (
        (github.ref == 'refs/heads/dev') ||
        (github.ref == 'refs/heads/staging') ||
        (github.ref == 'refs/heads/main')
      )) ||
      (github.event_name == 'pull_request_target' && (
        (github.event.pull_request.base.ref == 'dev') ||
        (github.event.pull_request.base.ref == 'staging')
      ))
    
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
        run: terraform apply -auto-approve tfplan
