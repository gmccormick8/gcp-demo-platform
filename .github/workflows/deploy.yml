name: Terraform Deploy Pipeline

on:
  push:
    branches: [ "dev" ]
  pull_request_target:
    branches: [ "prod", "staging" ]
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    
    permissions:
      contents: 'read'
      id-token: 'write'

    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}
      plan_summary: ${{ steps.plan_summary.outputs.summary }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      
     
      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.TERRAFORM_SA_EMAIL }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12.0'

      - name: Terraform Format
        env:
          TF_IN_AUTOMATION: "true"
        run: terraform fmt -check -recursive

      - name: Terraform Init
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          TF_VAR_argocd_secret_name: ${{ secrets.ARGOCD_SECRET_NAME }}
          TF_VAR_environment: ${{ github.ref_name }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.gcp-auth.outputs.credentials_file_path }}
        run: |
          terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          TF_VAR_argocd_secret_name: ${{ secrets.ARGOCD_SECRET_NAME }}
          TF_VAR_environment: ${{ github.ref_name }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.gcp-auth.outputs.credentials_file_path }}
        run: |
          terraform plan -detailed-exitcode -out=terraform-plan.tfplan -input=false \
            -var="project_id=${{ secrets.PROJECT_ID }}" \
            -var="argocd_secret_name=${{ secrets.ARGOCD_SECRET_NAME }}" \
            -var="environment=${{ github.ref_name }}" || echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Check for Changes
        id: check_changes
        run: |
          # If plan exists, determine if there are changes (exit code 2 means changes)
          if [[ "${{ steps.plan.outputs.exitcode }}" == "2" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in Terraform plan"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in Terraform plan"
          fi

      - name: Output Readable Plan
        run: terraform show -no-color terraform-plan.tfplan > plan.txt

      - name: Create Plan Summary
        id: plan_summary
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo 'summary<<EOF' >> $GITHUB_OUTPUT
          grep -A 20 "Terraform will perform the following actions" plan.txt | head -n 20 >> $GITHUB_OUTPUT
          echo "..." >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            terraform-plan.tfplan
          retention-days: 1

      - name: Upload Text Terraform Plan 
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-txt
          path: |
            plan.txt
          retention-days: 1

  manual-approval:
    needs: plan
    if: ${{ needs.plan.outputs.has_changes == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ secrets.APPROVERS}}
          minimum-approvals: 1
          issue-title: 'Manual Approval for ${{ github.ref_name }} Deployment'
          issue-body: |
            Please review this deployment to ${{ github.ref_name }}.
            ${{ needs.plan.outputs.plan_summary }}
          fail-on-denial: true


  apply:
    needs: [plan, manual-approval]
    if: ${{ needs.plan.outputs.has_changes == 'true' && needs.manual-approval.result == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.TERRAFORM_SA_EMAIL }}
          token_format: 'access_token'
          create_credentials_file: true
          audience: "https://iam.googleapis.com/${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12.0'

      - name: Terraform Init
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          TF_VAR_argocd_secret_name: ${{ secrets.ARGOCD_SECRET_NAME }}
          TF_VAR_environment: ${{ github.ref_name }}
        run: |
          terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan

      - name: Skip Apply if No Changes
        if: ${{ needs.plan.outputs.has_changes == 'false' }}
        run: echo "No changes detected in Terraform plan, skipping apply"

      - name: Terraform Apply
        if: ${{ needs.plan.outputs.has_changes == 'true' }}
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          TF_VAR_argocd_secret_name: ${{ secrets.ARGOCD_SECRET_NAME }}
          TF_VAR_environment: ${{ github.ref_name }}
        run: terraform apply -auto-approve terraform-plan.tfplan
