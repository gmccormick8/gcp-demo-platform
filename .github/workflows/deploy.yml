name: Terraform Infrastructure Pipeline

on:
  push:
    branches: [ "dev" ]
  pull_request_target:
    branches: [ "prod", "staging" ]
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          # This is important for pull_request_target to checkout PR code

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12.0'

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform Validate
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
        run: terraform validate -no-color

      - name: Terraform Plan
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          # Prevent prompts in CI/CD environment
          TF_IN_AUTOMATION: "true"
        run: |
          # Create plan with detailed exit codes:
          # 0 = No changes
          # 1 = Error
          # 2 = Changes present
          terraform plan -detailed-exitcode -out=tfplan -no-color || \
          if [ $? -eq 1 ]; then
            echo "Terraform plan failed"
            exit 1
          fi

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  manual-approval:
    needs: plan
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    permissions:
      issues: write
      pull-requests: write
    if: |
      needs.plan.result == 'success' && 
      (github.ref_name == 'prod' || github.ref_name == 'staging')
    steps:
      - name: Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ secrets.APPROVERS}}
          minimum-approvals: 1
          issue-title: 'Manual Approval for ${{ github.ref_name }} Deployment'
          issue-body: |
            Please approve this deployment to ${{ github.ref_name }}.
            The Terraform plan is available for review in the artifacts.
          fail-on-denial: true

  apply:
    needs: [plan, manual-approval]
    if: |
      needs.plan.result == 'success' &&
      (
        github.ref_name == 'dev' ||
        (
          (github.ref_name == 'prod' || github.ref_name == 'staging') &&
          needs.manual-approval.result == 'success'
        )
      )
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12.0'

      - name: Terraform Init
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
        run: terraform apply -auto-approve tfplan
