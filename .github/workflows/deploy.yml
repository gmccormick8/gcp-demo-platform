name: Terraform Deploy Pipeline

on:
  push:
    branches: [ "dev" ]
  pull_request_target:
    branches: [ "prod", "staging" ]
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    
    permissions:
      contents: 'read'
      id-token: 'write'

    outputs:
      plan_status: ${{ steps.plan.outputs.plan_status }}
      error_message: ${{ steps.plan.outputs.error_message }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          # This is important for pull_request_target to checkout PR code

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12.0'

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform Validate
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          TF_IN_AUTOMATION: "true"
        run: |
          terraform plan -out=tfplan -no-color -detailed-exitcode
          exit_code=$?
          
          if [ $exit_code -eq 0 ]; then
            echo "plan_status=no_changes" >> "$GITHUB_OUTPUT"
            echo "error_message=" >> "$GITHUB_OUTPUT"
            echo "No changes detected in plan"
          elif [ $exit_code -eq 1 ]; then
            echo "plan_status=error" >> "$GITHUB_OUTPUT"
            echo "error_message=Terraform plan failed" >> "$GITHUB_OUTPUT"
            exit 1
          elif [ $exit_code -eq 2 ]; then
            echo "plan_status=has_changes" >> "$GITHUB_OUTPUT"
            echo "Changes detected in plan"
            # Create human-readable plan output
            terraform show -no-color tfplan > draft-tfplan.txt
          else
            echo "plan_status=error" >> "$GITHUB_OUTPUT"
            echo "error_message=Unexpected exit code: $exit_code" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
      - name: Upload Terraform Plan
        if: steps.plan.outputs.plan_status == 'has_changes'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            tfplan
          retention-days: 1

      - name: Upload Readable Terraform Plan
        if: steps.plan.outputs.plan_status == 'has_changes'
        uses: actions/upload-artifact@v4
        with:
          name: draft-tfplan
          path: |
            draft-tfplan.txt
          retention-days: 1

  no-changes:
    needs: plan
    if: needs.plan.outputs.plan_status == 'no_changes'
    runs-on: ubuntu-latest
    steps:
      - name: No Changes Detected
        run: |
          echo "No changes detected in Terraform plan"
          echo "Workflow completed successfully"

  manual-approval:
    needs: plan
    if: needs.plan.outputs.plan_status == 'has_changes'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ secrets.APPROVERS}}
          minimum-approvals: 1
          issue-title: 'Manual Approval for ${{ github.ref_name }} Deployment'
          issue-body: |
            Please approve this deployment to ${{ github.ref_name }}.
            The Terraform plan is available for review in the artifacts as "draft-tfplan.txt".
          fail-on-denial: true

  apply:
    needs: [plan, manual-approval]
    if: |
      needs.plan.outputs.plan_status == 'has_changes' && 
      needs.manual-approval.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12.0'

      - name: Terraform Init
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
        run: terraform apply -auto-approve tfplan
