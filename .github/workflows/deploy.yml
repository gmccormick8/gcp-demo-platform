name: Terraform Deploy Pipeline

on:
  push:
    branches: [ "dev" ]
  pull_request_target:
    branches: [ "prod", "staging" ]
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    
    permissions:
      contents: 'read'
      id-token: 'write'

    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      
     
      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.TERRAFORM_SA_EMAIL }}
          token_format: "access_token"
          create_credentials_file: true
          
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12.0'

      - name: Terraform Format
        env:
          TF_IN_AUTOMATION: "true"
        run: terraform fmt -check -recursive

      - name: Terraform Init
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          TF_VAR_argocd_secret_name: ${{ secrets.ARGOCD_SECRET_NAME }}
          TF_VAR_environment: ${{ github.ref_name }}
        run: |
          terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          TF_VAR_argocd_secret_name: ${{ secrets.ARGOCD_SECRET_NAME }}
          TF_VAR_environment: ${{ github.ref_name }}
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
          TF_IN_AUTOMATION: "true"
        run: |
          terraform plan -detailed-exitcode -out=terraform-plan.tfplan -input=false -no-color \
            -var="project_id=${{ secrets.PROJECT_ID }}" \
            -var="argocd_secret_name=${{ secrets.ARGOCD_SECRET_NAME }}" \
            -var="environment=${{ github.ref_name }}" || echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Check for Changes
        id: check_changes
        run: |
          # If plan exists, determine if there are changes (exit code 2 means changes)
          if [[ "${{ steps.plan.outputs.exitcode }}" == "2" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in Terraform plan"
          elif [[ "${{ steps.plan.outputs.exitcode }}" == "1" ]]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Errors detected in Terraform plan"
            echo "Errors detected in Terraform plan" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in Terraform plan"
          fi

      - name: Upload Terraform Plan
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            terraform-plan.tfplan
          retention-days: 1
          
      - name: Output Plan Summary
        id: plan_markdown
        uses: borchero/terraform-plan-comment@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          planfile: terraform-plan.tfplan
          skip-empty: true      
          
      - name: Create Plan Summary File
        id: create_plan_summary
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo '${{ steps.plan_markdown.outputs.markdown }}' > plan_summary.md

      - name: Upload Plan Summary
        id: upload_plan_markdown
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-summary
          path: plan_summary.md
          retention-days: 1
          
  manual-approval:
    needs: plan
    if: ${{ needs.plan.outputs.has_changes == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    permissions:
      issues: write
      pull-requests: write
    steps:      
    
      - name: Download Terraform Plan Summary
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-summary

      - name: Read Plan Summary
        id: read_plan_summary
        run: |
          PLAN_SUMMARY=$(cat plan_summary.md)
          # Convert to JSON string and set as output
          PLAN_SUMMARY_JSON=$(echo "$PLAN_SUMMARY" | jq -R -s '.')
          echo "plan_summary=$PLAN_SUMMARY_JSON" >> $GITHUB_OUTPUT

      - name: Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ secrets.APPROVERS}}
          minimum-approvals: 1
          issue-title: 'Manual Approval for ${{ github.ref_name }} Deployment'
          issue-body: |
            Please review this deployment to ${{ github.ref_name }}.
            
            ## Terraform Plan Summary
            ${{ fromJson(steps.read_plan_summary.outputs.plan_summary) }}
          fail-on-denial: true


  apply:
    needs: [plan, manual-approval]
    if: ${{ needs.plan.outputs.has_changes == 'true' && needs.manual-approval.result == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Authenticate to GCP
        id: gcp-auth-apply
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.TERRAFORM_SA_EMAIL }}
          token_format: "access_token"
          create_credentials_file: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12.0'      
          
      - name: Terraform Init
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          TF_VAR_argocd_secret_name: ${{ secrets.ARGOCD_SECRET_NAME }}
          TF_VAR_environment: ${{ github.ref_name }}
        run: |
          terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan

      - name: Skip Apply if No Changes
        if: ${{ needs.plan.outputs.has_changes == 'false' }}
        run: echo "No changes detected in Terraform plan, skipping apply"
        
      - name: Terraform Apply
        if: ${{ needs.plan.outputs.has_changes == 'true' }}
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          TF_VAR_argocd_secret_name: ${{ secrets.ARGOCD_SECRET_NAME }}
          TF_VAR_environment: ${{ github.ref_name }}
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.gcp-auth-apply.outputs.access_token }}
          TF_IN_AUTOMATION: "true"
        run: terraform apply -auto-approve terraform-plan.tfplan      
        
      - name: Display Terraform Outputs
        id: terraform_outputs
        if: ${{ needs.plan.outputs.has_changes == 'true' }}
        run: |
          # Extract outputs directly
          # Create a GitHub Actions Step Summary with Markdown
          echo "## Terraform Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "Environment: **${{ github.ref_name }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # ArgoCD Access Information
          echo "### ArgoCD Access Information" >> $GITHUB_STEP_SUMMARY
            # Get the ArgoCD external IP directly from terraform output
          ARGOCD_URL=$(terraform output -raw argocd_url || echo "Not available")
          ARGOCD_IP=$(terraform output -json argocd_info | jq -r '.value.external_ip // "Not available"')
          PASSWORD_INFO=$(terraform output -json argocd_info | jq -r '.value.password_info // "Not available"')
          
          echo "- **URL:** [$ARGOCD_URL]($ARGOCD_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- **External IP:** \`$ARGOCD_IP\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Username:** \`admin\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Password:** $PASSWORD_INFO" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** \`$(terraform output -json argocd_info | jq -r '.value.gitops_repo // "Not available"')\`" >> $GITHUB_STEP_SUMMARY
          
          # Set outputs for use in subsequent steps
          echo "argocd_url=$ARGOCD_URL" >> $GITHUB_OUTPUT
          echo "argocd_ip=$ARGOCD_IP" >> $GITHUB_OUTPUT
          
          # Add cluster details
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GKE Cluster Information" >> $GITHUB_STEP_SUMMARY
          terraform output -json gke_clusters | jq -r '.value | to_entries[] | "- **\(.key)**: \(.value.name) (\(.value.location))"' >> $GITHUB_STEP_SUMMARY
          
          # Display full outputs in the log
          echo ""
          echo "================ TERRAFORM OUTPUTS ================"
          terraform output
          echo "=================================================="
