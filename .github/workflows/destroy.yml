name: Terraform Destroy Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy (dev/staging/prod)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      confirmation:
        description: 'Type the environment name again to confirm destruction'
        required: true
        type: string

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    # Only proceed if confirmation matches environment and branch name matches environment
    if: inputs.confirmation == inputs.environment && endsWith(github.ref_name, inputs.environment)
    
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12.0'

      - name: Terraform Init
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform Plan Destroy
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          TF_IN_AUTOMATION: "true"
        run: |
          # Create destroy plan
          terraform plan -destroy -out=tfplan -no-color
          
          # Create human-readable plan output
          terraform show -no-color tfplan > draft-tfplan.txt

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            tfplan
          retention-days: 1

      - name: Upload Readable Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: draft-tfplan
          path: |
            draft-tfplan.txt
          retention-days: 1

  manual-approval:
    needs: plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: inputs.confirmation == inputs.environment && endsWith(github.ref_name, inputs.environment)
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ secrets.APPROVERS}}
          minimum-approvals: 1
          issue-title: 'Manual Approval for ${{ inputs.environment }} Destruction'
          issue-body: |
            Review this ${{ inputs.environment }} destroy plan carefully before proceeding!
            The Terraform plan is available for review in the artifacts as "draft-tfplan.txt".
          fail-on-denial: true

  destroy:
    needs: manual-approval
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: inputs.confirmation == inputs.environment && endsWith(github.ref_name, inputs.environment)
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12.0'

      - name: Terraform Init
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform Apply
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          TF_IN_AUTOMATION: "true"
        run: terraform apply -auto-approve tfplan
