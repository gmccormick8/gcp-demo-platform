name: Terraform Destroy Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy (dev/staging/prod)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      confirmation:
        description: 'Type the environment name again to confirm destruction'
        required: true
        type: string

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      contents: 'read'
    
    # Only proceed if confirmation matches environment and branch name matches environment
    if: inputs.confirmation == inputs.environment && endsWith(github.ref_name, inputs.environment)
     
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      
     
      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.TERRAFORM_SA_EMAIL }}
          token_format: "access_token"
          create_credentials_file: true
          
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12.0'

      - name: Terraform Init
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          TF_VAR_argocd_secret_name: ${{ secrets.ARGOCD_SECRET_NAME }}
          TF_VAR_environment: ${{ github.ref_name }}
        run: |
          terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform Destroy
        id: destroy
        env:
          TF_VAR_project_id: ${{ secrets.PROJECT_ID }}
          TF_VAR_argocd_secret_name: ${{ secrets.ARGOCD_SECRET_NAME }}
          TF_VAR_environment: ${{ github.ref_name }}
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
        run: |
          terraform destroy -auto-approve \
            -var="project_id=${{ secrets.PROJECT_ID }}" \
            -var="argocd_secret_name=${{ secrets.ARGOCD_SECRET_NAME }}" \
            -var="environment=${{ github.ref_name }}"